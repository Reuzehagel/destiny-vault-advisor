name: Build wishlist

# Regenerates wishlists/*.txt from the tier sheet + Bungie manifest and commits any changes,
# so the raw GitHub URLs DIM subscribes to stay current. See docs/adr/0002-sheet-to-dim-wishlist.md.

on:
  schedule:
    - cron: "0 9 * * *" # daily, 09:00 UTC
  workflow_dispatch: {} # manual run from the Actions tab

permissions:
  contents: write # to commit the regenerated files

concurrency:
  group: build-wishlist
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate wishlist files
        env:
          BUNGIE_API_KEY: ${{ secrets.BUNGIE_API_KEY }}
        run: node scripts/build-wishlist.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add wishlists/
          if git diff --cached --quiet; then
            echo "No wishlist changes."
          else
            git commit -m "chore: refresh wishlists [skip ci]"
            git push
          fi
