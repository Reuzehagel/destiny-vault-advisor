<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root { color-scheme: dark; }
      body {
        width: 240px;
        margin: 0;
        padding: 12px;
        font: 13px/1.4 system-ui, sans-serif;
        background: #16181d;
        color: #e8e8ea;
      }
      h1 { font-size: 13px; margin: 0 0 2px; }
      .sub { font-size: 11px; opacity: 0.6; margin-bottom: 10px; }
      .tiers { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
      label {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 4px 6px;
        border-radius: 6px;
        cursor: pointer;
      }
      label:hover { background: #20242c; }
      .grade {
        width: 20px;
        height: 20px;
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        color: #0b0d10;
        font-size: 12px;
      }
      .count { margin-left: auto; opacity: 0.6; font-variant-numeric: tabular-nums; }
      .btns { display: flex; gap: 8px; }
      button {
        flex: 1;
        cursor: pointer;
        border: 0;
        border-radius: 6px;
        padding: 7px 8px;
        font: inherit;
        color: #fff;
      }
      #apply, #redundant-apply { background: #238636; }
      #copy, #redundant-copy { background: #30343c; }
      button:disabled { opacity: 0.5; cursor: default; }
      .status { font-size: 11px; opacity: 0.75; margin-top: 8px; min-height: 14px; }
      hr { border: 0; border-top: 1px solid #2a2d34; margin: 12px 0; }
      .toggle { display: flex; align-items: center; gap: 8px; padding: 4px 6px; cursor: pointer; }
      .toggle .count { margin-left: auto; opacity: 0.6; font-variant-numeric: tabular-nums; }
      .hint { font-size: 11px; opacity: 0.55; margin: 4px 6px 0; }
    </style>
  </head>
  <body>
    <h1>Tier search</h1>
    <div class="sub">Owned weapons by tier → DIM search</div>
    <label class="toggle" style="margin: 0 0 8px">
      <input type="checkbox" id="exclude" />
      <span>Exclude exotics</span>
    </label>
    <div class="tiers" id="tiers"></div>
    <div class="btns">
      <button id="apply">Apply to DIM</button>
      <button id="copy">Copy</button>
    </div>
    <div class="status" id="status"></div>

    <hr />
    <h1>Redundant rolls <span class="count" id="redundant-count" style="opacity:.6">0</span></h1>
    <div class="sub">Duplicate copies worse than your best</div>
    <label class="toggle" style="margin: 0 0 8px">
      <input type="checkbox" id="redundant" />
      <span>Highlight on tiles</span>
    </label>
    <div class="btns">
      <button id="redundant-apply">Apply to DIM</button>
      <button id="redundant-copy">Copy</button>
    </div>
    <div class="hint">Filters DIM to weapons with a shardable copy; the worse copies are outlined.</div>

    <script src="popup.js"></script>
  </body>
</html>
