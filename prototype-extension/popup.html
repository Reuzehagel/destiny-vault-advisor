<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <!-- DIM's UI font, loaded the same way DIM does. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
      /* Values lifted from DIM's source (themes/_theme.scss, _variables.scss):
         brand #e8a534, PWA background #202034, translucent-white buttons. */
      :root { color-scheme: dark; --accent: #e8a534; --text-secondary: #aaa; }
      * { box-sizing: border-box; }
      body {
        width: 248px;
        margin: 0;
        padding: 14px;
        font: 13px/1.45 "Open Sans", system-ui, sans-serif;
        color: #fff;
        background: #202034; /* DIM's flat PWA background color */
        -webkit-font-smoothing: antialiased;
      }
      h1 { font-size: 13px; font-weight: 700; margin: 0 0 2px; }
      .sub { font-size: 11px; color: var(--text-secondary); margin-bottom: 12px; }
      .tiers { display: flex; flex-direction: column; gap: 3px; margin-bottom: 12px; }
      label {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 5px 7px;
        border-radius: 7px;
        cursor: pointer;
        transition: background-color 0.12s ease;
      }
      label:hover { background: rgb(255 255 255 / 0.08); }
      input[type="checkbox"] { accent-color: var(--accent); width: 14px; height: 14px; }
      .grade {
        width: 22px;
        height: 22px;
        border-radius: 5px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        color: #000;
        font-size: 12px;
        box-shadow: inset 0 0 0 1px rgb(255 255 255 / 0.2);
      }
      .count {
        margin-left: auto;
        color: var(--text-secondary);
        font-variant-numeric: tabular-nums;
      }
      .btns { display: flex; gap: 8px; }
      /* DIM button: translucent white, turns brand-gold on hover. */
      button {
        flex: 1;
        cursor: pointer;
        border: 1px solid transparent;
        border-radius: 7px;
        padding: 8px;
        font: inherit;
        color: #fff;
        background: rgb(255 255 255 / 0.2);
        text-shadow: 1px 1px 3px rgb(0 0 0 / 0.25);
        transition: transform 0.1s cubic-bezier(0.2, 0, 0, 1), background-color 0.12s ease, color 0.12s ease;
      }
      button:hover { background: var(--accent); color: #000; text-shadow: none; }
      button:active { transform: scale(0.96); }
      #apply, #redundant-apply { background: rgb(255 255 255 / 0.3); font-weight: 700; }
      button:disabled { opacity: 0.5; cursor: default; transform: none; background: rgb(255 255 255 / 0.2); color: #fff; }
      .status { font-size: 11px; color: #d8d8e4; margin-top: 8px; min-height: 14px; }
      hr { border: 0; border-top: 1px solid rgb(255 255 255 / 0.12); margin: 14px 0; }
      .toggle { display: flex; align-items: center; gap: 9px; padding: 5px 7px; cursor: pointer; }
      .toggle .count { margin-left: auto; }
      .hint { font-size: 11px; color: #9a9ab0; margin: 6px 7px 0; text-wrap: pretty; }
      #coverage { transition: opacity 0.12s ease; }
      #coverage:hover { opacity: 0.85; }
    </style>
  </head>
  <body>
    <h1>Tier search</h1>
    <div class="sub">Owned weapons by tier → DIM search</div>
    <label class="toggle" style="margin: 0 0 8px">
      <input type="checkbox" id="exclude" />
      <span>Exclude exotics</span>
    </label>
    <div class="tiers" id="tiers"></div>
    <div class="btns">
      <button id="apply">Apply to DIM</button>
      <button id="copy">Copy</button>
    </div>
    <div class="status" id="status"></div>
    <div class="hint" id="coverage" style="cursor: pointer"></div>

    <hr />
    <h1>Duplicates <span class="count" id="redundant-count" style="opacity:.6">0</span> <span style="opacity:.6;font-weight:400">to shard</span></h1>
    <div class="sub">Keeps your best copy of each, flags the rest</div>
    <label class="toggle" style="margin: 0 0 8px">
      <input type="checkbox" id="redundant" />
      <span>Highlight on tiles</span>
    </label>
    <div class="btns">
      <button id="redundant-apply">Apply to DIM</button>
      <button id="redundant-copy">Copy</button>
    </div>
    <div class="hint">Green = keep (best roll), red = shard. Apply filters DIM to weapons with extra copies.</div>

    <script src="popup.js"></script>
  </body>
</html>
