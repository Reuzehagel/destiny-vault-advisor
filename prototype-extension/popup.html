<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        width: 248px;
        margin: 0;
        padding: 14px;
        /* Match DIM's UI font; fall back cleanly if Open Sans isn't installed. */
        font: 13px/1.4 "Open Sans", system-ui, sans-serif;
        background: #16181d;
        color: #e8e8ea;
        -webkit-font-smoothing: antialiased;
      }
      h1 { font-size: 13px; font-weight: 700; margin: 0 0 2px; letter-spacing: 0.01em; }
      .sub { font-size: 11px; opacity: 0.6; margin-bottom: 12px; }
      .tiers { display: flex; flex-direction: column; gap: 3px; margin-bottom: 12px; }
      label {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 5px 7px;
        border-radius: 7px;
        cursor: pointer;
        transition: background-color 0.12s ease;
      }
      label:hover { background: #20242c; }
      input[type="checkbox"] { accent-color: #f5b942; width: 14px; height: 14px; }
      .grade {
        width: 22px;
        height: 22px;
        border-radius: 5px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        color: #0b0d10;
        font-size: 12px;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.2);
      }
      .count {
        margin-left: auto;
        opacity: 0.6;
        font-variant-numeric: tabular-nums;
      }
      .btns { display: flex; gap: 8px; }
      button {
        flex: 1;
        cursor: pointer;
        border: 0;
        border-radius: 7px;
        padding: 8px;
        font: inherit;
        font-weight: 600;
        color: #fff;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
        transition: transform 0.1s cubic-bezier(0.2, 0, 0, 1), filter 0.12s ease;
      }
      button:hover { filter: brightness(1.1); }
      button:active { transform: scale(0.96); }
      #apply, #redundant-apply { background: #238636; }
      #copy, #redundant-copy { background: #30343c; }
      button:disabled { opacity: 0.5; cursor: default; transform: none; filter: none; }
      .status { font-size: 11px; opacity: 0.75; margin-top: 8px; min-height: 14px; }
      hr { border: 0; border-top: 1px solid #2a2d34; margin: 14px 0; }
      .toggle { display: flex; align-items: center; gap: 9px; padding: 5px 7px; cursor: pointer; }
      .toggle .count { margin-left: auto; }
      .hint { font-size: 11px; opacity: 0.55; margin: 6px 7px 0; text-wrap: pretty; }
      #coverage { transition: opacity 0.12s ease; }
      #coverage:hover { opacity: 0.85; }
    </style>
  </head>
  <body>
    <h1>Tier search</h1>
    <div class="sub">Owned weapons by tier → DIM search</div>
    <label class="toggle" style="margin: 0 0 8px">
      <input type="checkbox" id="exclude" />
      <span>Exclude exotics</span>
    </label>
    <div class="tiers" id="tiers"></div>
    <div class="btns">
      <button id="apply">Apply to DIM</button>
      <button id="copy">Copy</button>
    </div>
    <div class="status" id="status"></div>
    <div class="hint" id="coverage" style="cursor: pointer"></div>

    <hr />
    <h1>Redundant rolls <span class="count" id="redundant-count" style="opacity:.6">0</span></h1>
    <div class="sub">Duplicate copies worse than your best</div>
    <label class="toggle" style="margin: 0 0 8px">
      <input type="checkbox" id="redundant" />
      <span>Highlight on tiles</span>
    </label>
    <div class="btns">
      <button id="redundant-apply">Apply to DIM</button>
      <button id="redundant-copy">Copy</button>
    </div>
    <div class="hint">Filters DIM to weapons with a shardable copy; the worse copies are outlined.</div>

    <script src="popup.js"></script>
  </body>
</html>
